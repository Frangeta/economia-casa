<style>
:root{
  --bg:#F4F5F2; --card:#FFFFFF; --ink:#1C2B24; --muted:#6E7B73; --line:#E3E6E1;
  --ingreso:#1E6B4F; --ingreso-bg:#E4F0EA; --gasto:#A6432D; --gasto-bg:#F6E9E4;
  --interno:#57687A; --interno-bg:#E8EDF2; --plan:#B8892E; --plan-bg:#F5EEDC;
  --ok:#1E6B4F; --warn:#B8892E; --bad:#A6432D;
}
*{box-sizing:border-box} html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.45;font-size:15px}
#app{max-width:680px;margin:0 auto;min-height:100vh;padding-bottom:84px}
.mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.serif{font-family:Georgia,'Times New Roman',serif}
header{padding:18px 16px 10px;display:flex;justify-content:space-between;align-items:baseline}
header h1{font-family:Georgia,serif;font-size:20px;margin:0;font-weight:400;letter-spacing:0.01em}
header .cuenta{font-size:11px;color:var(--muted)}
.muted{color:var(--muted)} .micro{font-size:12px} .tiny{font-size:11px}
.pos{color:var(--ingreso)} .neg{color:var(--gasto)} .int{color:var(--interno)}
main{padding:0 12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px}
.row{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* selector de mes */
.mespicker{display:flex;align-items:center;justify-content:space-between;padding:4px 4px 12px}
.mespicker button{background:none;border:1px solid var(--line);border-radius:8px;width:34px;height:34px;font-size:16px;color:var(--ink);cursor:pointer}
.mespicker button:disabled{opacity:0.3}
.mespicker .mes{font-family:Georgia,serif;font-size:17px;text-transform:capitalize}

/* KPIs */
.kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.kpi .lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:2px}
.kpi .val{font-family:Georgia,serif;font-size:19px;font-variant-numeric:tabular-nums}
.kpi .sub{font-size:11px;color:var(--muted);margin-top:1px}

/* cinta del mes */
.cinta{height:26px;border-radius:7px;overflow:hidden;display:flex;margin:8px 0 6px;border:1px solid var(--line)}
.cinta>div{height:100%;min-width:2px}
.leyenda{display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--muted)}
.leyenda .dot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:4px;vertical-align:-1px}

/* grupos */
.grupo{padding:10px 12px;cursor:pointer}
.grupo .barra{height:6px;background:var(--bg);border-radius:4px;margin-top:7px;overflow:hidden;position:relative}
.grupo .barra .fill{height:100%;border-radius:4px;background:var(--interno)}
.grupo .barra .marca{position:absolute;top:-2px;width:2px;height:10px;background:var(--plan)}
.grupo.abierto{border-color:#CBD3CC}
.catlist{margin-top:10px;border-top:1px solid var(--line);padding-top:6px}
.catrow{display:flex;justify-content:space-between;padding:5px 0 5px 4px;font-size:13px;cursor:pointer;border-radius:6px}
.catrow:hover{background:var(--bg)}

/* listas de movimientos */
.mov{display:flex;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line);align-items:baseline;cursor:pointer}
.mov:last-child{border-bottom:none}
.mov .fecha{font-size:11px;color:var(--muted);width:44px;flex-shrink:0}
.mov .desc{flex:1;min-width:0}
.mov .desc .cat{font-size:11px;color:var(--muted)}
.mov .imp{font-variant-numeric:tabular-nums;font-size:14px;flex-shrink:0}
.pill{display:inline-block;font-size:10px;padding:1px 7px;border-radius:9px;background:var(--interno-bg);color:var(--interno);vertical-align:1px}
.pill.rev{background:var(--plan-bg);color:var(--plan)}

/* formularios */
input[type=text],input[type=search],select{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:var(--card);color:var(--ink);font-family:inherit}
input:focus,select:focus,button:focus-visible{outline:2px solid var(--ingreso);outline-offset:1px}
.btn{display:inline-block;background:var(--ink);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:14px;cursor:pointer;font-family:inherit}
.btn.sec{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.btn.peligro{background:var(--gasto)}
.btn:disabled{opacity:0.4;cursor:default}
.filtros{display:flex;gap:8px;margin-bottom:10px}
.filtros select{flex:1}

/* import */
.drop{border:2px dashed var(--line);border-radius:12px;padding:34px 16px;text-align:center;color:var(--muted);cursor:pointer;background:var(--card)}
.drop.over{border-color:var(--ingreso);color:var(--ingreso);background:var(--ingreso-bg)}
.resultado td{padding:3px 12px 3px 0;font-size:14px}

/* bandeja */
.bandeja-item{padding:12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:var(--card)}
.bandeja-item .acciones{display:flex;gap:8px;margin-top:9px}
.bandeja-item select{flex:1}
.regla-box{margin-top:9px;padding:9px;background:var(--bg);border-radius:8px;display:flex;gap:8px;align-items:center}
.regla-box input{flex:1}

/* hoja de edición */
#velo{position:fixed;inset:0;background:rgba(28,43,36,0.4);display:none;z-index:20}
#hoja{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-radius:16px 16px 0 0;padding:18px 16px 24px;display:none;z-index:21;max-width:680px;margin:0 auto;max-height:80vh;overflow-y:auto}
#hoja h3{margin:0 0 4px;font-family:Georgia,serif;font-weight:400;font-size:16px}
#hoja .campo{margin-top:12px}
#hoja label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);display:block;margin-bottom:4px}

/* nav inferior */
nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;max-width:680px;margin:0 auto;z-index:10}
nav button{flex:1;background:none;border:none;padding:10px 1px 12px;font-size:10px;color:var(--muted);cursor:pointer;font-family:inherit;position:relative}
nav button.on{color:var(--ink);font-weight:600}
nav button .badge{position:absolute;top:5px;right:calc(50% - 22px);background:var(--gasto);color:#fff;font-size:9px;border-radius:8px;padding:0 5px;min-width:15px}
nav button svg{display:block;margin:0 auto 2px;width:20px;height:20px;stroke:currentColor;stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round}

.vacio{text-align:center;color:var(--muted);padding:36px 16px;font-size:14px}
h2.seccion{font-family:Georgia,serif;font-weight:400;font-size:16px;margin:16px 4px 8px}

/* presupuesto */
.presu-row{display:grid;grid-template-columns:1fr auto 88px 22px;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--line)}
.presu-row:first-of-type{border-top:none}
.presu-nom{font-size:13px}
.presu-input input{width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:7px;font-size:13px;text-align:right;font-variant-numeric:tabular-nums;font-family:inherit}
.presu-input input.ajustado{border-color:var(--plan);background:var(--plan-bg);font-weight:600;color:var(--plan)}
.presu-x{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;width:22px;text-align:center;padding:0}

/* login */
#login .box{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:28px 24px;max-width:360px;width:100%}
#login h1{font-family:Georgia,serif;font-weight:400;font-size:22px;margin:0 0 4px;display:flex;align-items:center;gap:8px}
#login p{color:var(--muted);font-size:13px;margin:0 0 20px}
#login .campo{margin-bottom:12px}
#login label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);display:block;margin-bottom:5px}
#login input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:8px;font-size:15px;font-family:inherit}
#login .btn{width:100%;margin-top:6px;padding:12px}
#login .err{color:var(--gasto);font-size:13px;margin-top:12px;min-height:18px}
#sync{position:fixed;top:0;left:0;right:0;background:var(--plan);color:#fff;text-align:center;font-size:12px;padding:5px;z-index:40;display:none}
#topbar{display:flex;align-items:center;gap:10px}
#topbar .salir{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline}
@media (prefers-reduced-motion:no-preference){ .cinta>div{transition:width 0.4s ease} }
</style>
</head>

    <p>Introduce tu correo y contraseña para acceder.</p>

    <button class="btn" id="lg-btn" onclick="hacerLogin()">Entrar</button>
    <div class="err" id="lg-err"></div>
  </div>
</div>
<div id="sync"></div>

function movId(fecha, importe, saldo){
  return fecha+'|'+importe.toFixed(2)+'|'+(saldo==null?'x':saldo.toFixed(2));
}
/* dos movimientos reales pueden compartir fecha+importe+saldo (p.ej. dos compras idénticas
   el mismo día); se discrimina con un sufijo estable según el orden dentro del extracto */
function idUnico(base, vistos){
  const n = (vistos.get(base)||0)+1; vistos.set(base,n);
  return n===1 ? base : base+'#'+n;
}
function isoDate(v){
  if (v instanceof Date) {
    return v.getFullYear()+'-'+String(v.getMonth()+1).padStart(2,'0')+'-'+String(v.getDate()).padStart(2,'0');
  }
  if (typeof v === 'string'){
    const m = v.trim().match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
    if (m) return m[3]+'-'+m[2]+'-'+m[1];
    const m2 = v.trim().match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m2) return m2[1]+'-'+m2[2]+'-'+m2[3];
  }
  if (typeof v === 'number'){ // serial Excel
    const d = new Date(Math.round((v-25569)*86400*1000));
    return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');
  }
  return null;
}
const num = v => { if (v==null||v==='') return null; const n = typeof v==='number'?v:parseFloat(String(v).replace(/\./g,'').replace(',','.')); return isNaN(n)?null:n; };

/* ============ PARSERS ============ */
function detectarFormato(rows){
  for (let i=0;i<Math.min(rows.length,8);i++){
    const cells = (rows[i]||[]).map(c=>String(c??''));
    if (cells.some(c=>c.includes('Número de cuenta'))) return {formato:'TT', headerIdx:i};
    if (cells.some(c=>c==='Fecha') && cells.some(c=>c==='Importe')) return {formato:'MC', headerIdx:i};
  }
  return null;
}

function parseTT(rows, headerIdx){
  const hdr = rows[headerIdx].map(c=>String(c??'').trim());
  const col = name => hdr.findIndex(h=>h===name);
  const iCuenta=col('Número de cuenta'), iFop=col('F. Operación'), iFval=col('F. Valor'),
        iIng=col('Ingreso (+)'), iGas=col('Gasto (-)'), iSp=col('Saldo (+)'), iSn=col('Saldo (-)'),
        iCC=col('Concepto común'), iCP=col('Concepto propio'), iR1=col('Referencia 1'), iR2=col('Referencia 2');
  const iComps=[]; for (let k=1;k<=10;k++){ const i=col('Concepto complementario '+k); if(i>=0) iComps.push(i); }
  const out=[]; let cuenta=null; const vistos=new Map();
  for (let i=headerIdx+1;i<rows.length;i++){
    const r=rows[i]||[];
    const fecha=isoDate(r[iFop]); if(!fecha) continue;
    if (!cuenta && r[iCuenta]) cuenta=String(r[iCuenta]).trim();
    const ing=num(r[iIng])||0, gas=num(r[iGas])||0;
    const importe=r2(ing-gas);
    const saldo = num(r[iSp])!=null ? num(r[iSp]) : (num(r[iSn])!=null ? -num(r[iSn]) : null);
    const partes=[];
    for (const ic of iComps){ const v=r[ic]; if (typeof v==='string' && v.trim()) partes.push(v.trim().replace(/\s+/g,' ')); }
    const ref2 = r[iR2]!=null ? String(r[iR2]).trim() : '';
    if (ref2) partes.push(ref2);
    out.push({
      id: idUnico(movId(fecha,importe,saldo),vistos), fecha, fechaValor: isoDate(r[iFval])||fecha,
      importe, saldo, descripcion: partes.join(' | '),
      raw: { formato:'TT',
        codComun: r[iCC]!=null ? String(Math.trunc(num(r[iCC])??-1)).padStart(2,'0') : null,
        codPropio: r[iCP]!=null ? String(r[iCP]).replace(/\.0$/,'').padStart(3,'0') : null,
        ref1: r[iR1]!=null?String(r[iR1]):null, ref2: ref2||null }
    });
  }
  return {cuenta, movs: out};
}

function parseMC(rows, headerIdx){
  const hdr = rows[headerIdx].map(c=>String(c??'').trim());
  const col = n => hdr.findIndex(h=>h===n);
  const iF=col('Fecha'), iFv=col('Fecha valor'), iM=col('Movimiento'), iMd=col('Más datos'), iI=col('Importe'), iS=col('Saldo');
  let cuenta=null; const vistos=new Map();
  const c0=String(rows[0]?.[0]??''); const m=c0.match(/cuenta\s+([A-Z0-9 ]+)/i); if(m) cuenta=m[1].trim();
  const out=[];
  for (let i=headerIdx+1;i<rows.length;i++){
    const r=rows[i]||[];
    const fecha=isoDate(r[iF]); if(!fecha) continue;
    const importe=r2(num(r[iI])??0);
    const saldo=num(r[iS]);
    const partes=[String(r[iM]??'').trim()]; const md=String(r[iMd]??'').trim(); if(md) partes.push(md);
    out.push({
      id: idUnico(movId(fecha,importe,saldo),vistos), fecha, fechaValor: isoDate(r[iFv])||fecha,
      importe, saldo, descripcion: partes.filter(Boolean).join(' | '),
      raw: { formato:'MC', codComun:null, codPropio:null, ref1:null, ref2:null }
    });
  }
  return {cuenta, movs: out};
}

/* ============ MOTOR DE CATEGORIZACIÓN ============ */
function categorizar(mov, R){
  const D = (mov.descripcion||'').toUpperCase();
  const dl = D.toLowerCase();
  // 1) cuentas de ahorro propias
  for (const c of (R.cuentasAhorro||[])) if (D.includes(c.toUpperCase())) return {cat:'ahorro', via:'regla'};
  // 2) otras cuentas / bancos propios
  for (const c of (R.cuentasPropias||[])) if (D.includes(c.toUpperCase())) return {cat:'traspasos', via:'regla'};
  // 3) diccionario de comercios: gana la clave más larga
  let best=null;
  for (const k in R.comercios){ if (dl.includes(k) && (!best || k.length>best[0].length)) best=[k,R.comercios[k]]; }
  if (best) return {cat:best[1], via:'dict'};
  // 4) palabras clave (orden)
  for (const [cat,kws] of R.palabrasClave){ for (const kw of kws){ if (D.includes(kw)) return {cat, via:'regla'}; } }
  // 5) Bizum
  const esBizum = D.includes('BIZUM') || (mov.raw.codComun==='04' && mov.raw.codPropio==='002');
  if (esBizum) return {cat: mov.importe<0?'bizum_env':'bizum_rec', via:'codigo'};
  // 6) nombre del titular => traspaso entre cuentas propias
  for (const n of (R.nombresPropios||[])) if (D.includes(n.toUpperCase())) return {cat:'traspasos', via:'regla'};
  // 7) códigos CaixaBank
  if (mov.raw.codComun && R.codigos && R.codigos[mov.raw.codComun]) return {cat:R.codigos[mov.raw.codComun], via:'codigo'};
  return null;
}

/* concepto agrupador para la bandeja: persona del Bizum o comercio dominante */
function conceptoDe(mov){
  const partes = (mov.descripcion||'').split('|').map(s=>s.trim()).filter(Boolean);
  const pers = partes.find(p=>/^[A-ZÁÉÍÓÚÑa-záéíóúñ .-]+;[A-ZÁÉÍÓÚÑa-záéíóúñ .;-]+$/.test(p));
  if (pers) return {tipo:'persona', clave: pers.replace(/;/g,' ').replace(/\s+/g,' ').trim()};
  const GEN = ['COMPRA CON TARJETA','OPERACION TARJETA','CUOTA T'];
  for (const p of partes){
    const P = p.toUpperCase();
    if (/[A-ZÁÉÍÓÚÑ]{3}/.test(P) && !GEN.some(g=>P.includes(g)) && !P.startsWith('ABONO') && !P.startsWith('PAGO '))
      return {tipo:'comercio', clave: p.replace(/\s+ES\d{2}.*$/,'').slice(0,34).trim()};
  }
  if (partes.some(p=>p.toUpperCase().startsWith('CUOTA T'))) return {tipo:'comercio', clave:'CUOTA TARJETA'};
  return {tipo:'comercio', clave:'Compra con tarjeta sin comercio'};
}

function claveValida(k, R){
  const kk = k.trim().toLowerCase();
  if (kk.length < 4) return {ok:false, motivo:'La clave necesita al menos 4 caracteres.'};
  if ((R.clavesProhibidas||[]).some(p=>kk.includes(p))) return {ok:false, motivo:'Clave demasiado genérica: contiene un término prohibido.'};
  if (/^\d+$/.test(kk)) return {ok:false, motivo:'Una clave solo numérica no identifica un comercio.'};
  return {ok:true, clave:kk};
}

/* Adaptador: escribe en Firestore (batch por lotes) y refleja en la caché local */
async function dbPutAll(movs){
  if (!movs.length) return;
  await cachePut(movs);
  const col = FS.collection('movimientos');
  for (let i=0;i<movs.length;i+=400){
    const batch = FS.batch();
    for (const m of movs.slice(i,i+400)) batch.set(col.doc(fsId(m.id)), m);
    await batch.commit();
  }
}
async function dbGetAll(){ return await cacheGetAll(); }  // se lee de caché; Firestore sincroniza aparte
async function dbClear(){
  await cacheClear();
  const snap = await FS.collection('movimientos').get();
  for (let i=0;i<snap.docs.length;i+=400){
    const batch = FS.batch();
    for (const d of snap.docs.slice(i,i+400)) batch.delete(d.ref);
    await batch.commit();
  }
}
/* IDs de movimiento llevan '|', '#' y '/', no válidos como ID de documento Firestore: se codifican */
function fsId(id){ return encodeURIComponent(id).replace(/\./g,'%2E'); }

let escuchaMovs=null, escuchaConfig=null, importando=false, primerSnapshot=true;
let renderPend=null;
function renderDebounced(){ clearTimeout(renderPend); renderPend=setTimeout(()=>{ if(!importando) render(); }, 120); }

/* Listener en vivo de movimientos: arranque desde caché + sincronización en tiempo real con la nube */
function escucharMovimientos(){
  if (escuchaMovs) escuchaMovs();
  escuchaMovs = FS.collection('movimientos').onSnapshot(snap=>{
    MOVS = snap.docs.map(d=>d.data());
    // refresca la caché local para que el próximo arranque sin conexión esté al día
    cacheClear().then(()=>{ if(MOVS.length) cachePut(MOVS); });
    bannerSync(snap.metadata.fromCache ? 'Sin conexión · datos locales' : '');
    if (!primerSnapshot || !importando) renderDebounced();
    primerSnapshot=false;
  }, err=>{ bannerSync('Error de sincronización'); console.error(err); });
}

/* Listener en vivo de la configuración compartida (presupuesto, reglas, metadatos) */
function escucharConfig(){
  if (escuchaConfig) escuchaConfig();
  const refs = ['config/categorias','config/reglas','config/meta'];
  const unsubs = refs.map(path => FS.doc(path).onSnapshot(doc=>{
    if (!doc.exists || doc.metadata.hasPendingWrites) return; // ignora ecos de escrituras propias
    const v = doc.data().v;
    if (path.endsWith('categorias')) CATS = v;
    else if (path.endsWith('reglas')) REGLAS = v;
    else META = v;
    renderDebounced();
  }));
  escuchaConfig = ()=>unsubs.forEach(u=>u());
}
function bannerSync(txt){ const b=document.getElementById('sync'); b.textContent=txt; b.style.display=txt?'block':'none'; }

let seedActualizada = false;
async function cargarConfig(){
  // Config compartida vive en Firestore: config/categorias, config/reglas, config/meta
  let cfgCat=null, cfgReg=null, cfgMeta=null;
  try {
    const [c,r,m] = await Promise.all([
      FS.doc('config/categorias').get(), FS.doc('config/reglas').get(), FS.doc('config/meta').get()
    ]);
    if (c.exists) cfgCat = c.data().v;
    if (r.exists) cfgReg = r.data().v;
    if (m.exists) cfgMeta = m.data().v;
  } catch(e){ /* offline: se cae a valores locales/semilla */ }

  CATS = cfgCat || JSON.parse(localStorage.getItem(LS.cats)||'null') || SEED.categorias.map(c=>({...c}));
  REGLAS = cfgReg || JSON.parse(localStorage.getItem(LS.reglas)||'null') || JSON.parse(JSON.stringify(SEED.reglas));
  META = cfgMeta || JSON.parse(localStorage.getItem(LS.meta)||'null') || {schemaVersion:SEED.schemaVersion, cuenta:null, ultimaImportacion:null, seedRev:0};

  // fusiona novedades de la semilla pública sin pisar lo aprendido
  if ((SEED.seedRev||1) > (META.seedRev||0)){
    for (const k in SEED.reglas.comercios) if (!(k in REGLAS.comercios)) REGLAS.comercios[k]=SEED.reglas.comercios[k];
    const tienen = new Set(REGLAS.palabrasClave.flatMap(([,kws])=>kws));
    for (const [cat,kws] of SEED.reglas.palabrasClave){
      const nuevas = kws.filter(k=>!tienen.has(k));
      if (nuevas.length){
        const ex = REGLAS.palabrasClave.find(r=>r[0]===cat);
        if (ex) ex[1].push(...nuevas); else REGLAS.palabrasClave.push([cat,nuevas]);
      }
    }
    for (const c of SEED.categorias) if (!CATS.find(x=>x.id===c.id)) CATS.push({...c});
    for (const campo of ['cuentasAhorro','cuentasPropias','nombresPropios','clavesProhibidas'])
      REGLAS[campo] = [...new Set([...(REGLAS[campo]||[]), ...(SEED.reglas[campo]||[])])];
    META.seedRev = SEED.seedRev; seedActualizada = true;
  }

  // Primer arranque: cargar los datos privados (nombres/cuentas) que no van en el código
  if (!META.privadosCargados && typeof DATOS_PRIVADOS !== 'undefined' && DATOS_PRIVADOS){
    Object.assign(REGLAS.comercios, DATOS_PRIVADOS.comercios||{});
    for (const campo of ['cuentasAhorro','cuentasPropias','nombresPropios'])
      REGLAS[campo] = [...new Set([...(REGLAS[campo]||[]), ...((DATOS_PRIVADOS[campo])||[])])];
    for (const [cat,kws] of (DATOS_PRIVADOS.palabrasClave||[])){
      const ex = REGLAS.palabrasClave.find(r=>r[0]===cat);
      if (ex) ex[1].push(...kws.filter(k=>!ex[1].includes(k))); else REGLAS.palabrasClave.push([cat,kws]);
    }
    META.privadosCargados = true; seedActualizada = true;
  }
  if (seedActualizada) await guardarConfig();
}
async function guardarConfig(){
  localStorage.setItem(LS.cats, JSON.stringify(CATS));
  localStorage.setItem(LS.reglas, JSON.stringify(REGLAS));
  localStorage.setItem(LS.meta, JSON.stringify(META));
  try {
    await Promise.all([
      FS.doc('config/categorias').set({v:CATS}),
      FS.doc('config/reglas').set({v:REGLAS}),
      FS.doc('config/meta').set({v:META})
    ]);
  } catch(e){ /* offline: quedará en local y subirá al reconectar vía próxima escritura */ }
}

function flujoDe(catId){ const c=catById(catId); return c && c.tipo==='interno' ? 'interno' : 'real'; }

/* ---- Presupuesto: calculado vs ajustado a mano ---- */
// Plan efectivo de una categoría: el ajuste manual si existe, si no el calculado.
function planEfectivo(c){
  if (c.planManual!=null) return c.planManual;
  if (c.planCalc!=null) return c.planCalc;
  return c.planMes!=null ? c.planMes : 0; // compatibilidad con datos antiguos
}
// Recalcula planCalc de cada categoría de gasto desde los últimos 12 meses de movimientos.
// mediana: mediana de los totales mensuales (gastos estables). anualizado: total 12m / 12 (gastos irregulares).
function recalcularPlanes(){
  const ms = meses();
  if (!ms.length) return 0;
  const ultimo = ms[ms.length-1];
  // ventana de los 12 meses hasta el último con datos (excluye el mes en curso si está incompleto)
  const idxUlt = ms.length-1;
  const ventana = ms.slice(Math.max(0, idxUlt-12), idxUlt); // 12 meses cerrados anteriores al último
  const usar = ventana.length>=6 ? ventana : ms.slice(0, idxUlt).slice(-12); // fallback si hay poco histórico
  const base = usar.length ? usar : ms;
  // acumula gasto neto por categoría y mes
  const porCatMes = {};
  for (const m of MOVS){
    if (!base.includes(m.ym)) continue;
    const c = catById(m.categoriaId);
    if (!c || c.tipo!=='gasto') continue;
    (porCatMes[c.id] = porCatMes[c.id] || {});
    porCatMes[c.id][m.ym] = (porCatMes[c.id][m.ym]||0) + (-m.importe);
  }
  let n=0;
  for (const c of CATS){
    if (c.tipo!=='gasto') continue;
    const serie = base.map(ym => (porCatMes[c.id] && porCatMes[c.id][ym]) || 0);
    let val;
    if (c.metodoBase==='anualizado'){
      val = serie.reduce((a,b)=>a+b,0) / base.length; // media mensual (suave para irregulares)
    } else {
      const orden = [...serie].sort((a,b)=>a-b);
      const mid = Math.floor(orden.length/2);
      val = orden.length%2 ? orden[mid] : (orden[mid-1]+orden[mid])/2; // mediana
    }
    c.planCalc = Math.round(val);
    n++;
  }
  return n;
}


function aplicarCategoria(mov){
  const r = categorizar(mov, REGLAS);
  if (r){ mov.categoriaId=r.cat; mov.via=r.via; mov.flujo=flujoDe(r.cat); }
  else { mov.categoriaId=null; mov.via=null; mov.flujo='real'; }
  mov.revisado = mov.revisado||false;
  return mov;
}

/* ============ IMPORTACIÓN ============ */
async function importarFichero(file){
  importando=true;
  try{
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf,{cellDates:true});
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet,{header:1,raw:true,defval:null});
  const det = detectarFormato(rows);
  if (!det) return {error:'No reconozco el formato. Espero el extracto completo (TT) o el fichero de Movimientos de cuenta.'};
  const parsed = det.formato==='TT' ? parseTT(rows,det.headerIdx) : parseMC(rows,det.headerIdx);
  const porId = new Map(MOVS.map(m=>[m.id,m]));
  let nuevos=0, dups=0, enriquecidos=0; const aGuardar=[];
  for (const m of parsed.movs){
    m.ym = m.fecha.slice(0,7);
    const ex = porId.get(m.id);
    if (!ex){
      aplicarCategoria(m); m.nota=''; aGuardar.push(m); porId.set(m.id,m); nuevos++;
    } else if (m.raw.formato==='TT' && ex.raw.formato==='MC'){
      ex.descripcion=m.descripcion; ex.raw=m.raw;
      if (ex.via!=='manual') aplicarCategoria(ex);
      aGuardar.push(ex); enriquecidos++;
    } else dups++;
  }
  if (aGuardar.length){ await dbPutAll(aGuardar); MOVS=[...porId.values()]; }
  if (parsed.cuenta && !META.cuenta){ META.cuenta=parsed.cuenta; }
  META.ultimaImportacion=new Date().toISOString(); await guardarConfig();
  const sinCat = parsed.movs.filter(m=>porId.get(m.id).categoriaId===null).length;
  return {formato:det.formato, total:parsed.movs.length, nuevos, dups, enriquecidos, sinCat};
  } finally { importando=false; }
}

/* ============ CONSULTAS ============ */
const meses = () => [...new Set(MOVS.map(m=>m.ym))].sort();
const movsMes = ym => MOVS.filter(m=>m.ym===ym);
function resumenMes(ym){
  const ms = movsMes(ym);
  let ingReal=0, gasReal=0, intIn=0, intOut=0;
  const porGrupo={}, porCat={};
  for (const m of ms){
    const c = catById(m.categoriaId);
    const tipo = c ? c.tipo : (m.importe>0 ? 'ingreso' : 'gasto'); // sin categoría: + = ingreso, − = gasto
    if (tipo==='interno'){ if(m.importe>0) intIn+=m.importe; else intOut+=-m.importe; continue; }
    if (tipo==='ingreso'){ ingReal += m.importe; continue; }
    // gasto (o sin clasificar en negativo): el importe se suma con signo, así un reembolso (+) resta del grupo
    const gastoNeto = -m.importe;
    gasReal += gastoNeto;
    const g = c ? c.grupo : 'Sin clasificar';
    porGrupo[g]=(porGrupo[g]||0)+gastoNeto;
    const cid = m.categoriaId||'__null';
    porCat[cid]=(porCat[cid]||0)+gastoNeto;
  }
  return {ingReal:r2(ingReal), gasReal:r2(gasReal), intIn:r2(intIn), intOut:r2(intOut), porGrupo, porCat, n:ms.length};
}
const enBandeja = m => m.categoriaId===null || (m.categoriaId==='bizum_env' && !m.revisado);
const bandeja = () => MOVS.filter(enBandeja).sort((a,b)=>b.fecha.localeCompare(a.fecha));

function descCorta(m){
  const p = (m.descripcion||'').split('|').map(s=>s.trim()).filter(Boolean);
  const conLetras = p.find(s=>/[A-Za-zÁÉÍÓÚÑáéíóúñ]{3}/.test(s));
  return conLetras || p[0] || '(sin descripción)';
}

function htmlTotalFiltro(lista){
  if (!lista.length) return '';
  let ent=0, sal=0, interno=0;
  for (const m of lista){
    if (m.flujo==='interno'){ interno += m.importe; continue; }
    if (m.importe>0) ent += m.importe; else sal += -m.importe;
  }
  const neto = r2(ent - sal);
  const c = filtroCat && filtroCat!=='__null' ? catById(filtroCat) : null;
  const titulo = c ? c.nombre : (filtroCat==='__null' ? 'Sin clasificar' : 'Selección');

function gruposBandeja(){
  const grupos = new Map();
  for (const m of bandeja()){
    const c = conceptoDe(m);
    const k = c.tipo+'|'+c.clave.toUpperCase();
    if (!grupos.has(k)) grupos.set(k,{tipo:c.tipo, clave:c.clave, movs:[], total:0});
    const g = grupos.get(k); g.movs.push(m); g.total += Math.abs(m.importe);
  }
  return [...grupos.values()].sort((a,b)=>b.total-a.total);
}

function vPresupuesto(){

    <p class="micro muted" style="margin:0 4px 12px">El plan calculado sale de la mediana (o media, en gastos irregulares) de tus últimos 12 meses. Puedes fijar un valor a mano si sabes que un mes o de aquí en adelante será distinto; se muestra junto al calculado para que veas la diferencia.</p>
    ${grupos.map(g=>{
      const cats = gastoCats.filter(c=>c.grupo===g);

        ${cats.map(c=>{
          const manual = c.planManual!=null;

          return `<div class="presu-row">

async function fijarPlan(catId, valor){
  const c = catById(catId); if(!c) return;
  const v = valor.trim().replace(/[^\d.,-]/g,'').replace(/\./g,'').replace(',','.');
  const n = parseFloat(v);
  if (valor.trim()==='' || isNaN(n)){ c.planManual = null; }
  else { c.planManual = Math.round(n); }
  c.planMes = planEfectivo(c); // mantiene compatibilidad con el resumen
  await guardarConfig();
  render();
}
async function quitarPlan(catId){
  const c = catById(catId); if(!c) return;
  c.planManual = null; c.planMes = planEfectivo(c);
  await guardarConfig(); render();
}
async function recalcularYGuardar(){
  const n = recalcularPlanes();
  for (const c of CATS) c.planMes = planEfectivo(c);
  await guardarConfig();
  alert('Plan calculado actualizado para '+n+' categorías desde tus últimos 12 meses.');
  render();
}

async function asignarGrupo(gi){
  const g = window.__grupos[gi];
  const sel = document.getElementById('gsel-'+gi);
  if (!g || !sel.value) return;
  const cat = sel.value, fl = flujoDe(cat);
  for (const m of g.movs){ m.categoriaId=cat; m.via='manual'; m.revisado=true; m.flujo=fl; }
  await dbPutAll(g.movs);
  const chk = document.getElementById('gregla-'+gi);
  if (chk && chk.checked){
    const clave = (g.tipo==='persona' ? g.clave : g.clave.slice(0,30)).toLowerCase().trim();
    const v = claveValida(clave, REGLAS);
    if (v.ok){
      REGLAS.comercios[v.clave] = cat; guardarConfig();
      const extra=[];
      for (const x of MOVS){
        if (x.via==='manual') continue;
        if ((x.descripcion||'').toLowerCase().includes(v.clave)){ x.categoriaId=cat; x.via='dict'; x.flujo=fl; x.revisado=true; extra.push(x); }
      }
      if (extra.length) await dbPutAll(extra);
    }
  }
  render();
}

async function cargarPrivados(files){
  if (!files || !files.length) return;
  try{
    const txt = await files[0].text();
    let datos;
    // admite tanto el .js (window.DATOS_PRIVADOS = {...};) como un .json plano
    const m = txt.match(/window\.DATOS_PRIVADOS\s*=\s*(\{[\s\S]*\})\s*;?/);
    datos = JSON.parse(m ? m[1] : txt);
    if (!datos || !datos.comercios) throw new Error('El fichero no tiene el formato esperado.');
    Object.assign(REGLAS.comercios, datos.comercios||{});
    for (const campo of ['cuentasAhorro','cuentasPropias','nombresPropios'])
      REGLAS[campo] = [...new Set([...(REGLAS[campo]||[]), ...((datos[campo])||[])])];
    for (const [cat,kws] of (datos.palabrasClave||[])){
      const ex = REGLAS.palabrasClave.find(r=>r[0]===cat);
      if (ex) ex[1].push(...kws.filter(k=>!ex[1].includes(k))); else REGLAS.palabrasClave.push([cat,kws]);
    }
    META.privadosCargados = true;
    await guardarConfig();
    // recategoriza lo no manual con las nuevas reglas privadas
    const afectados=[];
    for (const x of MOVS){ if (x.via==='manual') continue; const antes=x.categoriaId; aplicarCategoria(x); if (x.categoriaId!==antes) afectados.push(x); }
    if (afectados.length) await dbPutAll(afectados);
    alert('Datos privados cargados y guardados en Firestore. '+afectados.length+' movimientos recategorizados.');
    render();
  }catch(e){ alert('No se pudieron cargar: '+e.message); }
}
function exportarBackup(){
  const data = {version:1, exportado:new Date().toISOString(), meta:META, categorias:CATS, reglas:REGLAS, movimientos:MOVS};
  const blob = new Blob([JSON.stringify(data)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'economia-casa-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(a.href);
}
async function restaurarBackup(files){
  if (!files.length) return;
  try{
    const data = JSON.parse(await files[0].text());
    if (!data.movimientos || !data.categorias) throw new Error('El fichero no parece una copia de esta herramienta.');
    if (!confirm(`La copia tiene ${data.movimientos.length} movimientos. Sustituirá todo lo actual. ¿Continuar?`)) return;
    await dbClear();
    MOVS = data.movimientos; CATS = data.categorias; REGLAS = data.reglas; META = data.meta||META;
    await dbPutAll(MOVS); guardarConfig(); render();
  }catch(err){ alert('No se pudo restaurar: '+err.message); }
}
async function borrarTodo(){
  if (!confirm('Se borrarán todos los movimientos y reglas aprendidas. ¿Seguro?')) return;
  if (!confirm('Última confirmación: esta acción no se puede deshacer sin una copia de seguridad.')) return;
  await dbClear(); localStorage.removeItem(LS.cats); localStorage.removeItem(LS.reglas); localStorage.removeItem(LS.meta);
  MOVS=[]; cargarConfig(); render();
}
async function recategorizarTodo(){

  alert(afectados.length+' movimientos han cambiado de categoría.');
  render();
}

function abrirHoja(id){
  const m = MOVS.find(x=>x.id===id); if(!m) return;
  const concepto = conceptoDe(m);
  const claveProp = (concepto.tipo==='persona'?concepto.clave:concepto.clave.slice(0,30)).toLowerCase().trim();
  const valida = claveValida(claveProp, REGLAS).ok;
  const similares = valida ? MOVS.filter(x=>x.id!==id && (x.descripcion||'').toLowerCase().includes(claveProp)) : [];
  const nAuto = similares.filter(x=>x.via!=='manual').length;
  const nMan = similares.length - nAuto;
  $('#velo').style.display='block';
  const h = $('#hoja'); h.style.display='block';
  h.dataset.clave = claveProp;
  h.innerHTML = `
    <h3>${esc(descCorta(m))}</h3>
    <div class="micro muted">${fmtDia(m.fecha)} ${m.fecha.slice(0,4)} · <span class="mono ${m.importe>0?'pos':'neg'}">${fmtEUR2(m.importe)}</span>${m.saldo!=null?` · saldo ${fmtEUR2(m.saldo)}`:''}</div>
    <div class="tiny muted" style="margin-top:6px;word-break:break-word">${esc(m.descripcion)}</div>
    <div class="campo"><label for="h-cat">Categoría</label>
      <select id="h-cat" onchange="refrescarPropagar()">${['<option value="">Sin clasificar</option>'].concat(agrupaOpciones(m.categoriaId)).join('')}</select></div>
    <div id="h-prop-wrap" data-nauto="${nAuto}" data-nman="${nMan}" data-catini="${m.categoriaId||''}"></div>
    <div class="campo"><label for="h-nota">Nota</label>
      <input type="text" id="h-nota" value="${esc(m.nota||'')}" placeholder="Opcional"></div>
    <div class="campo" style="display:flex;gap:8px">
      <button class="btn" onclick="guardarHoja('${m.id}')">Guardar</button>
      <button class="btn sec" onclick="cerrarHoja()">Cancelar</button>
    </div>`;
  refrescarPropagar();
}
function refrescarPropagar(){
  const wrap = $('#h-prop-wrap'); if(!wrap) return;
  const nAuto = +wrap.dataset.nauto, nMan = +wrap.dataset.nman;
  const cat = document.getElementById('h-cat').value;
  const cambia = cat && cat !== wrap.dataset.catini;
  const total = nAuto + nMan;
  if (!cambia || total===0){ wrap.innerHTML=''; return; }
  const nom = catById(cat)?.nombre || '';
  wrap.innerHTML = `<div class="regla-box" style="flex-direction:column;align-items:stretch;gap:8px">
    <label class="micro" style="display:flex;gap:8px;align-items:flex-start;cursor:pointer">
      <input type="checkbox" id="h-prop" style="width:auto;margin-top:2px">
      <span>Aplicar también a <strong>${total}</strong> movimiento${total>1?'s':''} igual${total>1?'es':''} (<span class="mono">"${esc($('#hoja').dataset.clave)}"</span>) → ${esc(nom)}, y recordar la regla${nMan?`. <span class="muted">Incluye ${nMan} que ya ajustaste a mano; se sobrescribirán.</span>`:'.'}</span>
    </label>
  </div>`;
}
async function guardarHoja(id){
  const m = MOVS.find(x=>x.id===id); if(!m) return;
  const cat = document.getElementById('h-cat').value || null;
  const catCambia = cat !== m.categoriaId;
  if (catCambia){ m.categoriaId=cat; m.via = cat?'manual':null; m.flujo = cat?flujoDe(cat):'real'; m.revisado=!!cat; }
  m.nota = document.getElementById('h-nota').value;
  const guardar = [m];
  const prop = document.getElementById('h-prop');
  if (cat && catCambia && prop && prop.checked){
    const clave = $('#hoja').dataset.clave;
    const v = claveValida(clave, REGLAS);
    if (v.ok){
      REGLAS.comercios[v.clave] = cat; guardarConfig();
      const fl = flujoDe(cat);
      for (const x of MOVS){
        if (x.id===id) continue;
        if ((x.descripcion||'').toLowerCase().includes(v.clave)){ x.categoriaId=cat; x.via='dict'; x.flujo=fl; x.revisado=true; guardar.push(x); }
      }
    }
  }
  await dbPutAll(guardar);
  cerrarHoja(); render();
}
function cerrarHoja(){ $('#velo').style.display='none'; $('#hoja').style.display='none'; }

/* ============ LOGIN Y ARRANQUE ============ */
async function hacerLogin(){
  const mail = document.getElementById('lg-mail').value.trim();
  const pass = document.getElementById('lg-pass').value;
  const err = document.getElementById('lg-err');
  const btn = document.getElementById('lg-btn');
  err.textContent=''; btn.disabled=true; btn.textContent='Entrando…';
  try {
    await AUTH.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    await AUTH.signInWithEmailAndPassword(mail, pass);
    // el observador onAuthStateChanged se encarga del resto
  } catch(e){
    const msg = {
      'auth/invalid-email':'Correo no válido.',
      'auth/invalid-credential':'Correo o contraseña incorrectos.',
      'auth/wrong-password':'Correo o contraseña incorrectos.',
      'auth/user-not-found':'Correo o contraseña incorrectos.',
      'auth/too-many-requests':'Demasiados intentos. Espera un momento.',
      'auth/network-request-failed':'Sin conexión. Revisa tu red.'
    }[e.code] || ('No se pudo entrar ('+e.code+').');
    err.textContent = msg;
  } finally { btn.disabled=false; btn.textContent='Entrar'; }
}
async function cerrarSesion(){ await AUTH.signOut(); location.reload(); }

function mostrarLogin(){ document.getElementById('login').style.display='flex'; document.getElementById('app').style.display='none'; }

AUTH.onAuthStateChanged(async user => {
  if (!user){ mostrarLogin(); return; }
  UID = user.uid;
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('topbar').innerHTML =
    `<h1>Economía de casa</h1><button class="salir" onclick="cerrarSesion()">Salir (${user.email})</button>`;
  try {
    DB = await abrirDB();
    await cargarConfig();
    MOVS = await cacheGetAll();
    render();                    // arranque instantáneo desde la caché local
    if (seedActualizada && MOVS.length){
      const afectados=[];
      for (const m of MOVS){ if (m.via==='manual') continue; const antes=m.categoriaId; aplicarCategoria(m); if (m.categoriaId!==antes) afectados.push(m); }
      if (afectados.length) await dbPutAll(afectados);
    }
    escucharMovimientos();       // sincronización en vivo con la nube (tiempo real)
    escucharConfig();
  } catch(e){
    document.getElementById('main').innerHTML = `<div class="card"><strong>Error al iniciar.</strong><div class="tiny mono" style="color:var(--gasto);margin-top:6px">${esc(e.message)}</div></div>`;
  }
});
// permite entrar con Enter desde la contraseña
document.addEventListener('keydown', e=>{ if(e.key==='Enter' && document.getElementById('login').style.display!=='none') hacerLogin(); });
</script>
