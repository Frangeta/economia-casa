<head>
<meta charset="UTF-8">
<title>EconomГӯa de casa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#F7F8FC; --card:#FFFFFF; --ink:#1B1F2A; --muted:#7A8194; --line:#EAECF3;
  --marca:#5B6EE8; --marca-bg:#EEF0FD;
  --ingreso:#0FA47F; --ingreso-bg:#E3F5EF; --gasto:#E5654B; --gasto-bg:#FCEAE5;
  --interno:#8A93A8; --interno-bg:#EFF1F6; --plan:#E0A32E; --plan-bg:#FBF2DD;
  --ok:#0FA47F; --warn:#E0A32E; --bad:#E5654B;
  --sombra:0 1px 3px rgba(27,31,42,.04), 0 6px 20px rgba(27,31,42,.05);
}
*{box-sizing:border-box} html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.45;font-size:15px}
#app{max-width:680px;margin:0 auto;min-height:100vh;padding-bottom:90px}
.mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.serif{font-family:'Fraunces',Georgia,serif}
header{padding:22px 16px 8px;display:flex;justify-content:space-between;align-items:flex-start}
header h1{font-family:'Fraunces',Georgia,serif;font-size:22px;margin:0;font-weight:600;letter-spacing:-0.01em}
header .saludo{font-size:13px;color:var(--muted);margin-top:2px}
header .cuenta{font-size:11px;color:var(--muted);background:var(--card);padding:4px 10px;border-radius:20px;border:1px solid var(--line);white-space:nowrap}
.muted{color:var(--muted)} .micro{font-size:12px} .tiny{font-size:11px}
.pos{color:var(--ingreso)} .neg{color:var(--gasto)} .int{color:var(--interno)}
main{padding:0 14px}
.card{background:var(--card);border:none;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:var(--sombra)}
.row{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* selector de mes */
.mespicker{display:flex;align-items:center;justify-content:space-between;padding:8px 2px 14px}
.mespicker button{background:var(--card);border:1px solid var(--line);border-radius:12px;width:38px;height:38px;font-size:17px;color:var(--ink);cursor:pointer;box-shadow:var(--sombra)}
.mespicker button:disabled{opacity:0.3;box-shadow:none}
.mespicker .mes{font-family:'Fraunces',serif;font-size:18px;font-weight:600;text-transform:capitalize}

/* KPIs */
.kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.kpi{background:var(--card);border:none;border-radius:16px;padding:14px;box-shadow:var(--sombra)}
.kpi .ic{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:9px}
.kpi .ic svg{width:17px;height:17px;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.kpi .lbl{font-size:11px;color:var(--muted);margin-bottom:2px}
.kpi .val{font-family:'Fraunces',serif;font-weight:600;font-size:20px;font-variant-numeric:tabular-nums;letter-spacing:-0.01em}
.kpi .sub{font-size:11px;color:var(--muted);margin-top:1px}

/* cinta del mes */
.cinta{height:26px;border-radius:8px;overflow:hidden;display:flex;margin:8px 0 6px}
.cinta>div{height:100%;min-width:2px}
.leyenda{display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--muted)}
.leyenda .dot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:4px;vertical-align:-1px}

/* grupos */
.grupo{padding:12px 2px;cursor:pointer;border-top:1px solid var(--line)}
.grupo:first-of-type{border-top:none}
.grupo .gnom{display:flex;align-items:center;gap:9px}
.gic{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;background:var(--marca-bg)}
.grupo .barra{height:8px;background:var(--bg);border-radius:6px;margin-top:8px;overflow:hidden;position:relative}
.grupo .barra .fill{height:100%;border-radius:6px;background:var(--interno)}
.grupo .barra .marca{position:absolute;top:-2px;width:2px;height:12px;background:var(--plan)}
.barra{height:8px;background:var(--bg);border-radius:6px;overflow:hidden;position:relative}
.barra .fill{height:100%;border-radius:6px;background:var(--interno)}
.catlist{margin-top:10px;border-top:1px solid var(--line);padding-top:6px}
.catrow{display:flex;justify-content:space-between;padding:7px 6px;font-size:13px;cursor:pointer;border-radius:8px;align-items:center}
.catrow:hover{background:var(--bg)}

/* listas de movimientos */
.mov{display:flex;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line);align-items:baseline;cursor:pointer}
.mov:last-child{border-bottom:none}
.mov .fecha{font-size:11px;color:var(--muted);width:44px;flex-shrink:0}
.mov .desc{flex:1;min-width:0}
.mov .desc .cat{font-size:11px;color:var(--muted)}
.mov .imp{font-variant-numeric:tabular-nums;font-size:14px;flex-shrink:0}
.pill{display:inline-block;font-size:10px;padding:1px 7px;border-radius:9px;background:var(--interno-bg);color:var(--interno);vertical-align:1px}
.pill.rev{background:var(--plan-bg);color:var(--plan)}

/* formularios */
input[type=text],input[type=search],input[type=email],input[type=password],select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:12px;font-size:14px;background:var(--card);color:var(--ink);font-family:inherit}
input:focus,select:focus,button:focus-visible{outline:2px solid var(--marca);outline-offset:1px}
.btn{display:inline-block;background:var(--marca);color:#fff;border:none;border-radius:12px;padding:11px 18px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.btn.sec{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.btn.peligro{background:var(--gasto)}
.btn:disabled{opacity:0.4;cursor:default}
.filtros{display:flex;gap:8px;margin-bottom:10px}
.filtros select{flex:1}

/* import */
.drop{border:2px dashed var(--line);border-radius:16px;padding:34px 16px;text-align:center;color:var(--muted);cursor:pointer;background:var(--card);box-shadow:var(--sombra)}
.drop.over{border-color:var(--marca);color:var(--marca);background:var(--marca-bg)}
.resultado td{padding:3px 12px 3px 0;font-size:14px}

/* bandeja */
.bandeja-item{padding:14px;border:none;border-radius:16px;margin-bottom:10px;background:var(--card);box-shadow:var(--sombra)}
.bandeja-item .acciones{display:flex;gap:8px;margin-top:9px}
.bandeja-item select{flex:1}
.regla-box{margin-top:9px;padding:10px;background:var(--bg);border-radius:10px;display:flex;gap:8px;align-items:center}
.regla-box input{flex:1}

/* hoja de ediciГіn */
#velo{position:fixed;inset:0;background:rgba(27,31,42,0.4);display:none;z-index:20}
#hoja{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-radius:22px 22px 0 0;padding:20px 18px 26px;display:none;z-index:21;max-width:680px;margin:0 auto;max-height:80vh;overflow-y:auto}
#hoja h3{margin:0 0 4px;font-family:'Fraunces',serif;font-weight:600;font-size:17px}
#hoja .campo{margin-top:12px}
#hoja label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);display:block;margin-bottom:4px}

/* nav inferior */
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;max-width:680px;margin:0 auto;z-index:10;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:6px 2px 8px}
nav::-webkit-scrollbar{display:none}
nav button{flex:1 0 auto;min-width:62px;background:none;border:none;padding:4px 4px;font-size:10px;color:var(--muted);cursor:pointer;font-family:inherit;position:relative;white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:3px}
nav button.on{color:var(--marca);font-weight:600}
nav button .navic{width:42px;height:28px;border-radius:12px;display:flex;align-items:center;justify-content:center;transition:background .15s}
nav button.on .navic{background:var(--marca-bg)}
nav button .badge{position:absolute;top:-1px;right:calc(50% - 24px);background:var(--gasto);color:#fff;font-size:9px;border-radius:8px;padding:0 5px;min-width:15px;text-align:center}
nav button svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round}

.vacio{text-align:center;color:var(--muted);padding:36px 16px;font-size:14px}
h2.seccion{font-family:'Fraunces',serif;font-weight:600;font-size:16px;margin:18px 4px 10px;letter-spacing:-0.01em}

/* barras previsiГіn vs real */
.pbar{position:relative;height:12px;background:var(--bg);border-radius:6px;margin-top:6px;overflow:visible;border:1px solid var(--line)}
.pbar-fill{position:absolute;left:0;top:0;height:100%;border-radius:6px;min-width:3px}
.pbar-prev{position:absolute;top:-3px;width:3px;height:18px;background:var(--ink);border-radius:2px;transform:translateX(-50%);box-shadow:0 0 0 1.5px var(--card)}
.pbar-ritmo{position:absolute;top:-1px;width:2px;height:14px;background:var(--muted);transform:translateX(-50%);opacity:0.7}
.pbar-bal .pbar-fill{left:auto}
.pbar-cero{position:absolute;left:50%;top:-3px;width:1px;height:18px;background:var(--muted);transform:translateX(-50%);opacity:0.5}

/* presupuesto */
.presu-row{display:grid;grid-template-columns:1fr auto 88px 22px;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--line)}.presu-row:first-of-type{border-top:none}
.presu-nom{font-size:13px}
.presu-input input{width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:7px;font-size:13px;text-align:right;font-variant-numeric:tabular-nums;font-family:inherit}
.presu-input input.ajustado{border-color:var(--plan);background:var(--plan-bg);font-weight:600;color:var(--plan)}
.presu-x{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;width:22px;text-align:center;padding:0}

/* login */
#login .box{background:var(--card);border:none;border-radius:20px;padding:30px 26px;max-width:360px;width:100%;box-shadow:var(--sombra)}
#login h1{font-family:'Fraunces',serif;font-weight:600;font-size:24px;margin:0 0 4px;display:flex;align-items:center;gap:8px;letter-spacing:-0.01em}
#login p{color:var(--muted);font-size:13px;margin:0 0 20px}
#login .campo{margin-bottom:12px}
#login label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);display:block;margin-bottom:5px}
#login input{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:12px;font-size:15px;font-family:inherit;background:var(--bg)}
#login .btn{width:100%;margin-top:6px;padding:13px}
#login .err{color:var(--gasto);font-size:13px;margin-top:12px;min-height:18px}
#sync{position:fixed;top:0;left:0;right:0;background:var(--plan);color:#fff;text-align:center;font-size:12px;padding:5px;z-index:40;display:none}
#topbar h1{font-family:'Fraunces',serif;font-weight:600;font-size:22px;margin:0;letter-spacing:-0.01em}
#topbar .salir{background:none;border:none;color:var(--marca);font-size:13px;cursor:pointer;font-family:inherit;padding:0;text-decoration:underline}
@media (prefers-reduced-motion:no-preference){ .cinta>div{transition:width 0.4s ease} }
</style>
</head>

  <div class="box">
    <h1>EconomГӯa de casa рҹҸЎ</h1>
    <p>Introduce tu correo y contraseГұa para acceder.</p>
    <div class="campo"><label for="lg-mail">Correo</label><input type="email" id="lg-mail" autocomplete="username"></div>
    <div class="campo"><label for="lg-pass">ContraseГұa</label><input type="password" id="lg-pass" autocomplete="current-password"></div>
    <button class="btn" id="lg-btn" onclick="hacerLogin()">Entrar</button>
    <div class="err" id="lg-err"></div>
  </div>
</div>
<div id="sync"></div>
<div id="app" style="display:none">

</div>

<div id="velo" onclick="cerrarHoja()"></div>

<nav id="nav"></nav>

function movId(fecha, importe, saldo){
  return fecha+'|'+importe.toFixed(2)+'|'+(saldo==null?'x':saldo.toFixed(2));
}
/* dos movimientos reales pueden compartir fecha+importe+saldo (p.ej. dos compras idГ©nticas
   el mismo dГӯa); se discrimina con un sufijo estable segГәn el orden dentro del extracto */
function idUnico(base, vistos){
  const n = (vistos.get(base)||0)+1; vistos.set(base,n);
  return n===1 ? base : base+'#'+n;
}
function isoDate(v){
  if (v instanceof Date) {
    return v.getFullYear()+'-'+String(v.getMonth()+1).padStart(2,'0')+'-'+String(v.getDate()).padStart(2,'0');
  }
  if (typeof v === 'string'){
    const m = v.trim().match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
    if (m) return m[3]+'-'+m[2]+'-'+m[1];
    const m2 = v.trim().match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m2) return m2[1]+'-'+m2[2]+'-'+m2[3];
  }
  if (typeof v === 'number'){ // serial Excel
    const d = new Date(Math.round((v-25569)*86400*1000));
    return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');
  }
  return null;
}

function detectarFormato(rows){
  for (let i=0;i<Math.min(rows.length,8);i++){
    const cells = (rows[i]||[]).map(c=>String(c??''));
    if (cells.some(c=>c.includes('NГәmero de cuenta'))) return {formato:'TT', headerIdx:i};
    if (cells.some(c=>c==='Fecha') && cells.some(c=>c==='Importe')) return {formato:'MC', headerIdx:i};
  }
  return null;
}

function parseTT(rows, headerIdx){
  const hdr = rows[headerIdx].map(c=>String(c??'').trim());
  const col = name => hdr.findIndex(h=>h===name);
  const iCuenta=col('NГәmero de cuenta'), iFop=col('F. OperaciГіn'), iFval=col('F. Valor'),
        iIng=col('Ingreso (+)'), iGas=col('Gasto (-)'), iSp=col('Saldo (+)'), iSn=col('Saldo (-)'),
        iCC=col('Concepto comГәn'), iCP=col('Concepto propio'), iR1=col('Referencia 1'), iR2=col('Referencia 2');
  const iComps=[]; for (let k=1;k<=10;k++){ const i=col('Concepto complementario '+k); if(i>=0) iComps.push(i); }
  const out=[]; let cuenta=null; const vistos=new Map();
  for (let i=headerIdx+1;i<rows.length;i++){
    const r=rows[i]||[];
    const fecha=isoDate(r[iFop]); if(!fecha) continue;
    if (!cuenta && r[iCuenta]) cuenta=String(r[iCuenta]).trim();
    const ing=num(r[iIng])||0, gas=num(r[iGas])||0;
    const importe=r2(ing-gas);
    const saldo = num(r[iSp])!=null ? num(r[iSp]) : (num(r[iSn])!=null ? -num(r[iSn]) : null);
    const partes=[];
    for (const ic of iComps){ const v=r[ic]; if (typeof v==='string' && v.trim()) partes.push(v.trim().replace(/\s+/g,' ')); }
    const ref2 = r[iR2]!=null ? String(r[iR2]).trim() : '';
    if (ref2) partes.push(ref2);
    out.push({
      id: idUnico(movId(fecha,importe,saldo),vistos), fecha, fechaValor: isoDate(r[iFval])||fecha,
      importe, saldo, descripcion: partes.join(' | '),
      raw: { formato:'TT',
        codComun: r[iCC]!=null ? String(Math.trunc(num(r[iCC])??-1)).padStart(2,'0') : null,
        codPropio: r[iCP]!=null ? String(r[iCP]).replace(/\.0$/,'').padStart(3,'0') : null,
        ref1: r[iR1]!=null?String(r[iR1]):null, ref2: ref2||null }
    });
  }
  return {cuenta, movs: out};
}

function parseMC(rows, headerIdx){
  const hdr = rows[headerIdx].map(c=>String(c??'').trim());
  const col = n => hdr.findIndex(h=>h===n);
  const iF=col('Fecha'), iFv=col('Fecha valor'), iM=col('Movimiento'), iMd=col('MГЎs datos'), iI=col('Importe'), iS=col('Saldo');
  let cuenta=null; const vistos=new Map();
  const c0=String(rows[0]?.[0]??''); const m=c0.match(/cuenta\s+([A-Z0-9 ]+)/i); if(m) cuenta=m[1].trim();
  const out=[];
  for (let i=headerIdx+1;i<rows.length;i++){
    const r=rows[i]||[];
    const fecha=isoDate(r[iF]); if(!fecha) continue;
    const importe=r2(num(r[iI])??0);
    const saldo=num(r[iS]);
    const partes=[String(r[iM]??'').trim()]; const md=String(r[iMd]??'').trim(); if(md) partes.push(md);
    out.push({

function categorizar(mov, R){
  const D = (mov.descripcion||'').toUpperCase();
  const dl = D.toLowerCase();

  for (const c of (R.cuentasAhorro||[])) if (D.includes(c.toUpperCase())) return {cat:'ahorro', via:'regla'};
  // 2) otras cuentas / bancos propios
  for (const c of (R.cuentasPropias||[])) if (D.includes(c.toUpperCase())) return {cat:'traspasos', via:'regla'};
  // 3) diccionario de comercios: gana la clave mГЎs larga
  let best=null;
  for (const k in R.comercios){ if (dl.includes(k) && (!best || k.length>best[0].length)) best=[k,R.comercios[k]]; }

  // 5) Bizum

  if (esBizum) return {cat: mov.importe<0?'bizum_env':'bizum_rec', via:'codigo'};
  // 6) nombre del titular => traspaso entre cuentas propias
  for (const n of (R.nombresPropios||[])) if (D.includes(n.toUpperCase())) return {cat:'traspasos', via:'regla'};
  // 7) cГіdigos CaixaBank
  if (mov.raw.codComun && R.codigos && R.codigos[mov.raw.codComun]) return {cat:R.codigos[mov.raw.codComun], via:'codigo'};
  return null;
}

/* concepto agrupador para la bandeja: persona del Bizum o comercio dominante */
function conceptoDe(mov){
  const partes = (mov.descripcion||'').split('|').map(s=>s.trim()).filter(Boolean);
  const pers = partes.find(p=>/^[A-ZГҒГүГҚГ“ГҡГ‘a-zГЎГ©ГӯГіГәГұ .-]+;[A-ZГҒГүГҚГ“ГҡГ‘a-zГЎГ©ГӯГіГәГұ .;-]+$/.test(p));
  if (pers) return {tipo:'persona', clave: pers.replace(/;/g,' ').replace(/\s+/g,' ').trim()};
  const GEN = ['COMPRA CON TARJETA','OPERACION TARJETA','CUOTA T'];
  for (const p of partes){
    const P = p.toUpperCase();
    if (/[A-ZГҒГүГҚГ“ГҡГ‘]{3}/.test(P) && !GEN.some(g=>P.includes(g)) && !P.startsWith('ABONO') && !P.startsWith('PAGO '))
      return {tipo:'comercio', clave: p.replace(/\s+ES\d{2}.*$/,'').slice(0,34).trim()};
  }
  if (partes.some(p=>p.toUpperCase().startsWith('CUOTA T'))) return {tipo:'comercio', clave:'CUOTA TARJETA'};
  return {tipo:'comercio', clave:'Compra con tarjeta sin comercio'};
}

function claveValida(k, R){
  const kk = k.trim().toLowerCase();
  if (kk.length < 4) return {ok:false, motivo:'La clave necesita al menos 4 caracteres.'};
  if ((R.clavesProhibidas||[]).some(p=>kk.includes(p))) return {ok:false, motivo:'Clave demasiado genГ©rica: contiene un tГ©rmino prohibido.'};
  if (/^\d+$/.test(kk)) return {ok:false, motivo:'Una clave solo numГ©rica no identifica un comercio.'};
  return {ok:true, clave:kk};
}

/* Adaptador: escribe en Firestore (batch por lotes) y refleja en la cachГ© local */
async function dbPutAll(movs){
  if (!movs.length) return;
  await cachePut(movs);
  const col = FS.collection('movimientos');
  for (let i=0;i<movs.length;i+=400){
    const batch = FS.batch();
    for (const m of movs.slice(i,i+400)) batch.set(col.doc(fsId(m.id)), m);
    await batch.commit();
  }
}
async function dbGetAll(){ return await cacheGetAll(); }  // se lee de cachГ©; Firestore sincroniza aparte
async function dbClear(){
  await cacheClear();
  const snap = await FS.collection('movimientos').get();
  for (let i=0;i<snap.docs.length;i+=400){
    const batch = FS.batch();
    for (const d of snap.docs.slice(i,i+400)) batch.delete(d.ref);
    await batch.commit();
  }
}

/* Listener en vivo de la configuraciГіn compartida (presupuesto, reglas, metadatos) */
function escucharConfig(){

let seedActualizada = false;
async function cargarConfig(){
  // Config compartida vive en Firestore: config/categorias, config/reglas, config/meta
  let cfgCat=null, cfgReg=null, cfgMeta=null;
  try {
    const [c,r,m] = await Promise.all([
      FS.doc('config/categorias').get(), FS.doc('config/reglas').get(), FS.doc('config/meta').get()
    ]);
    if (c.exists) cfgCat = c.data().v;
    if (r.exists) cfgReg = r.data().v;
    if (m.exists) cfgMeta = m.data().v;
  } catch(e){ /* offline: se cae a valores locales/semilla */ }

  CATS = cfgCat || JSON.parse(localStorage.getItem(LS.cats)||'null') || SEED.categorias.map(c=>({...c}));
  REGLAS = cfgReg || JSON.parse(localStorage.getItem(LS.reglas)||'null') || JSON.parse(JSON.stringify(SEED.reglas));
  META = cfgMeta || JSON.parse(localStorage.getItem(LS.meta)||'null') || {schemaVersion:SEED.schemaVersion, cuenta:null, ultimaImportacion:null, seedRev:0};

  // fusiona novedades de la semilla pГәblica sin pisar lo aprendido
  if ((SEED.seedRev||1) > (META.seedRev||0)){
    for (const k in SEED.reglas.comercios) if (!(k in REGLAS.comercios)) REGLAS.comercios[k]=SEED.reglas.comercios[k];
    const tienen = new Set(REGLAS.palabrasClave.flatMap(([,kws])=>kws));
    for (const [cat,kws] of SEED.reglas.palabrasClave){
      const nuevas = kws.filter(k=>!tienen.has(k));
      if (nuevas.length){
        const ex = REGLAS.palabrasClave.find(r=>r[0]===cat);
        if (ex) ex[1].push(...nuevas); else REGLAS.palabrasClave.push([cat,nuevas]);
      }
    }
    for (const c of SEED.categorias) if (!CATS.find(x=>x.id===c.id)) CATS.push({...c});
    for (const campo of ['cuentasAhorro','cuentasPropias','nombresPropios','clavesProhibidas'])
      REGLAS[campo] = [...new Set([...(REGLAS[campo]||[]), ...(SEED.reglas[campo]||[])])];
    META.seedRev = SEED.seedRev; seedActualizada = true;
  }

  // Primer arranque: cargar los datos privados (nombres/cuentas) que no van en el cГіdigo
  if (!META.privadosCargados && typeof DATOS_PRIVADOS !== 'undefined' && DATOS_PRIVADOS){

      REGLAS[campo] = [...new Set([...(REGLAS[campo]||[]), ...((DATOS_PRIVADOS[campo])||[])])];

function flujoDe(catId){ const c=catById(catId); return c && c.tipo==='interno' ? 'interno' : 'real'; }

/* ---- Presupuesto: calculado vs ajustado a mano ---- */
// Plan efectivo de una categorГӯa: el ajuste manual si existe, si no el calculado.
function planEfectivo(c){
  if (c.planManual!=null) return c.planManual;
  if (c.planCalc!=null) return c.planCalc;
  return c.planMes!=null ? c.planMes : 0; // compatibilidad con datos antiguos
}
// Recalcula planCalc de cada categorГӯa de gasto desde los Гәltimos 12 meses de movimientos.
// mediana: mediana de los totales mensuales (gastos estables). anualizado: total 12m / 12 (gastos irregulares).
function recalcularPlanes(){
  const ms = meses();
  if (!ms.length) return 0;
  const ultimo = ms[ms.length-1];
  // ventana de los 12 meses hasta el Гәltimo con datos (excluye el mes en curso si estГЎ incompleto)
  const idxUlt = ms.length-1;
  const ventana = ms.slice(Math.max(0, idxUlt-12), idxUlt); // 12 meses cerrados anteriores al Гәltimo
  const usar = ventana.length>=6 ? ventana : ms.slice(0, idxUlt).slice(-12); // fallback si hay poco histГіrico
  const base = usar.length ? usar : ms;
  // acumula neto por categorГӯa y mes (gasto = suma de -importe; ingreso = suma de +importe)
  const porCatMes = {};
  for (const m of MOVS){
    if (!base.includes(m.ym)) continue;
    const c = catById(m.categoriaId);
    if (!c || (c.tipo!=='gasto' && c.tipo!=='ingreso')) continue;
    (porCatMes[c.id] = porCatMes[c.id] || {});
    const signo = c.tipo==='ingreso' ? 1 : -1;
    porCatMes[c.id][m.ym] = (porCatMes[c.id][m.ym]||0) + (signo*m.importe);
  }
  let n=0;
  for (const c of CATS){
    if (c.tipo!=='gasto' && c.tipo!=='ingreso') continue;
    const serie = base.map(ym => (porCatMes[c.id] && porCatMes[c.id][ym]) || 0);
    let val;
    if (c.metodoBase==='anualizado'){
      val = serie.reduce((a,b)=>a+b,0) / base.length; // media mensual (suave para irregulares)
    } else {
      const orden = [...serie].sort((a,b)=>a-b);
      const mid = Math.floor(orden.length/2);
      val = orden.length%2 ? orden[mid] : (orden[mid-1]+orden[mid])/2; // mediana
    }
    c.planCalc = Math.round(val);
    n++;
  }
  return n;
}

/* PrevisiГіn del mes: previsto (plan vigente) vs real, en ingresos, gastos y balance */
function previsionMes(ym){
  const R = resumenMes(ym);
  const gastoPrev = CATS.filter(c=>c.tipo==='gasto').reduce((s,c)=>s+planEfectivo(c),0);
  const ingPrev   = CATS.filter(c=>c.tipo==='ingreso').reduce((s,c)=>s+planEfectivo(c),0);
  // desglose por categorГӯa de gasto: previsto vs real del mes
  const catGasto = CATS.filter(c=>c.tipo==='gasto').map(c=>({
    id:c.id, nombre:c.nombre, grupo:c.grupo,
    prev: planEfectivo(c),
    real: r2(R.porCat[c.id]||0),
    manual: c.planManual!=null
  })).filter(x=>x.prev>0 || x.real>0);
  return {
    ing:{prev:r2(ingPrev), real:R.ingReal},
    gasto:{prev:r2(gastoPrev), real:R.gasReal},
    balance:{prev:r2(ingPrev-gastoPrev), real:r2(R.ingReal-R.gasReal)},
    catGasto
  };
}
// progreso del mes en curso: fracciГіn de dГӯas transcurridos (para "ritmo esperado")
function fraccionMes(ym){
  const hoy = new Date();
  const [y,m] = ym.split('-').map(Number);
  const diasMes = new Date(y, m, 0).getDate();
  if (y<hoy.getFullYear() || (y===hoy.getFullYear() && m<hoy.getMonth()+1)) return 1; // mes pasado, completo
  if (y>hoy.getFullYear() || (y===hoy.getFullYear() && m>hoy.getMonth()+1)) return 0; // mes futuro
  return hoy.getDate()/diasMes; // mes en curso
}


function aplicarCategoria(mov){
  const r = categorizar(mov, REGLAS);
  if (r){ mov.categoriaId=r.cat; mov.via=r.via; mov.flujo=flujoDe(r.cat); }
  else { mov.categoriaId=null; mov.via=null; mov.flujo='real'; }
  mov.revisado = mov.revisado||false;
  return mov;
}

/* ============ IMPORTACIГ“N ============ */
async function importarFichero(file){
  importando=true;
  try{
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf,{cellDates:true});
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet,{header:1,raw:true,defval:null});
  const det = detectarFormato(rows);
  if (!det) return {error:'No reconozco el formato. Espero el extracto completo (TT) o el fichero de Movimientos de cuenta.'};
  const parsed = det.formato==='TT' ? parseTT(rows,det.headerIdx) : parseMC(rows,det.headerIdx);
  const porId = new Map(MOVS.map(m=>[m.id,m]));
  let nuevos=0, dups=0, enriquecidos=0; const aGuardar=[];
  for (const m of parsed.movs){
    m.ym = m.fecha.slice(0,7);
    const ex = porId.get(m.id);
    if (!ex){
      aplicarCategoria(m); m.nota=''; aGuardar.push(m); porId.set(m.id,m); nuevos++;
    } else if (m.raw.formato==='TT' && ex.raw.formato==='MC'){
      ex.descripcion=m.descripcion; ex.raw=m.raw;
      if (ex.via!=='manual') aplicarCategoria(ex);
      aGuardar.push(ex); enriquecidos++;
    } else dups++;
  }
  if (aGuardar.length){ await dbPutAll(aGuardar); MOVS=[...porId.values()]; }
  if (parsed.cuenta && !META.cuenta){ META.cuenta=parsed.cuenta; }
  META.ultimaImportacion=new Date().toISOString(); await guardarConfig();
  const sinCat = parsed.movs.filter(m=>porId.get(m.id).categoriaId===null).length;
  return {formato:det.formato, total:parsed.movs.length, nuevos, dups, enriquecidos, sinCat};
  } finally { importando=false; }
}

/* ============ CONSULTAS ============ */
const meses = () => [...new Set(MOVS.map(m=>m.ym))].sort();
const movsMes = ym => MOVS.filter(m=>m.ym===ym);
function resumenMes(ym){
  const ms = movsMes(ym);
  let ingReal=0, gasReal=0, intIn=0, intOut=0;
  const porGrupo={}, porCat={}, porIng={};
  for (const m of ms){
    const c = catById(m.categoriaId);
    const tipo = c ? c.tipo : (m.importe>0 ? 'ingreso' : 'gasto'); // sin categorГӯa: + = ingreso, вҲ’ = gasto
    if (tipo==='interno'){ if(m.importe>0) intIn+=m.importe; else intOut+=-m.importe; continue; }
    if (tipo==='ingreso'){
      ingReal += m.importe;
      const iid = m.categoriaId||'__ingsc';
      porIng[iid]=(porIng[iid]||0)+m.importe;
      continue;
    }
    // gasto (o sin clasificar en negativo): el importe se suma con signo, asГӯ un reembolso (+) resta del grupo
    const gastoNeto = -m.importe;
    gasReal += gastoNeto;
    const g = c ? c.grupo : 'Sin clasificar';
    porGrupo[g]=(porGrupo[g]||0)+gastoNeto;
    const cid = m.categoriaId||'__null';
    porCat[cid]=(porCat[cid]||0)+gastoNeto;
  }
  return {ingReal:r2(ingReal), gasReal:r2(gasReal), intIn:r2(intIn), intOut:r2(intOut), porGrupo, porCat, porIng, n:ms.length};
}
const enBandeja = m => m.categoriaId===null || (m.categoriaId==='bizum_env' && !m.revisado);

}

// barra previsto vs real. Para ingresos/gastos (siempre >=0) barra normal;
// para balance (puede ser negativo) barra divergente centrada en cero.
function barraPrev(prev, real, frac, esGasto){
  const ritmoFrac = frac>0 && frac<1 ? frac : null;
  // color: en mes en curso se juzga contra el ritmo esperado; en mes cerrado, contra el total
  let color;
  if (esGasto){
    const umbral = ritmoFrac!=null ? prev*ritmoFrac : prev;
    color = real<=umbral*1.02 ? 'var(--ingreso)' : (real<=prev ? 'var(--plan)' : 'var(--gasto)');
  } else {
    const umbral = ritmoFrac!=null ? prev*ritmoFrac : prev*0.98;
    color = real>=umbral ? 'var(--ingreso)' : 'var(--plan)';
  }
  const max = Math.max(prev, real, 1)*1.08;
  const wReal = Math.max(Math.min(real/max*100,100), real>0?1.5:0);
  const posPrev = Math.min(prev/max*100,100);
  const ritmo = ritmoFrac!=null ? Math.min((prev*ritmoFrac)/max*100,100) : null;
  return `<div class="pbar">
    <div class="pbar-fill" style="width:${wReal}%;background:${color}"></div>
    ${ritmo!=null?`<div class="pbar-ritmo" style="left:${ritmo}%" title="ritmo de hoy"></div>`:''}
    <div class="pbar-prev" style="left:${posPrev}%" title="previsto ${fmtEUR(prev)}"></div>
  </div>`;
}

// barra divergente para el balance (centro = 0, izquierda negativo, derecha positivo)
function barraBalance(prev, real, frac){
  const mag = Math.max(Math.abs(prev), Math.abs(real), 1)*1.1;
  const pos = v => 50 + (v/mag)*50; // 0 -> 50%
  const color = real>=prev ? 'var(--ingreso)' : 'var(--gasto)';
  const xReal = pos(real), xPrev = pos(prev);
  const izq = Math.min(50, xReal), anch = Math.abs(xReal-50);
  return `<div class="pbar pbar-bal">
    <div class="pbar-cero"></div>
    <div class="pbar-fill" style="left:${izq}%;width:${anch}%;background:${color};border-radius:${real<0?'6px 0 0 6px':'0 6px 6px 0'}"></div>
    <div class="pbar-prev" style="left:${xPrev}%" title="previsto ${fmtEUR(prev)}"></div>
  </div>`;
}

function htmlPrevision(ym){
  const p = previsionMes(ym);
  const frac = fraccionMes(ym);
  const enCurso = frac>0 && frac<1;
  const sinPrev = p.ing.prev===0 && p.gasto.prev===0;
  if (sinPrev) return ''; // sin presupuesto configurado, no mostramos previsiГіn

  // desvГӯo de balance
  const desvBal = r2(p.balance.real - p.balance.prev);
  const filaMain = (lbl, prev, real, tipo) => {
    const esGasto = tipo==='gasto';
    const desv = r2(real - prev);
    const signoBueno = esGasto ? desv<=0 : desv>=0;
    const barra = tipo==='balance' ? barraBalance(prev, real, frac) : barraPrev(prev, real, frac, esGasto);
    return `<div style="margin-bottom:14px">
      <div class="row" style="align-items:baseline;margin-bottom:2px">
        <span class="micro"><strong>${lbl}</strong></span>
        <span class="mono tiny"><span style="font-size:14px">${fmtEUR(real)}</span> <span class="muted">de ${fmtEUR(prev)} prev.</span>
          <span class="${signoBueno?'pos':'neg'}" style="margin-left:6px">${desv>=0?'+':''}${fmtEUR(desv)}</span></span>
      </div>
      ${barra}
    </div>`;
  };

  // categorГӯas mГЎs desviadas (real por encima de previsto)
  const desviadas = p.catGasto.map(c=>({...c, desv:r2(c.real-c.prev)}))
    .filter(c=>c.prev>0).sort((a,b)=>b.desv-a.desv);
  const pasadas = desviadas.filter(c=>c.desv>0).slice(0,5);

  return `<div class="card">
    <div class="row" onclick="togglePrevision()" style="cursor:pointer">
      <span><strong>PrevisiГіn del mes</strong>${enCurso?` <span class="tiny muted">dГӯa ${new Date().getDate()}, ${Math.round(frac*100)}% transcurrido</span>`:''}</span>
      <span class="micro ${desvBal>=0?'pos':'neg'} mono">balance ${desvBal>=0?'+':''}${fmtEUR(desvBal)} vs plan в–ҫ</span>
    </div>
    ${previsionAbierta?`
    <div style="margin-top:12px">
      ${filaMain('Ingresos', p.ing.prev, p.ing.real, 'ingreso')}
      ${filaMain('Gastos', p.gasto.prev, p.gasto.real, 'gasto')}
      ${filaMain('Balance', p.balance.prev, p.balance.real, 'balance')}
      <div class="tiny muted" style="margin:2px 0 12px">Relleno = real В· lГӯnea negra = previsto${enCurso?' В· lГӯnea gris = lo que llevarГӯas si el gasto fuera uniforme (hoy)':''}. Verde = bien (gasto dentro del plan / ingreso alcanzado), rojo/ГЎmbar = desviado.</div>
      ${pasadas.length?`<div class="micro muted" style="margin-bottom:4px">CategorГӯas por encima de lo previsto:</div>
        ${pasadas.map(c=>`<div class="catrow" onclick="verCategoria('${c.id}')">
          <span>${esc(c.nombre)}</span>
          <span class="mono">${fmtEUR(c.real)} <span class="muted">/ ${fmtEUR(c.prev)}</span> <span class="neg">+${fmtEUR(c.desv)}</span></span>
        </div>`).join('')}`
        :`<div class="micro pos">Ninguna categorГӯa se ha pasado del plan${enCurso?' de momento':''}.</div>`}
    </div>`:''}
  </div>`;
}

function gruposBandeja(){
  const grupos = new Map();
  for (const m of bandeja()){

    if (!grupos.has(k)) grupos.set(k,{tipo:c.tipo, clave:c.clave, movs:[], total:0});

function datosAnalisis(){
  const serie = serieMeses(anPeriodo>=999 ? meses().length : anPeriodo);
  const res = serie.map(ym=>({ym, r:resumenMes(ym)}));
  // grupos de gasto presentes, ordenados por gasto total en el periodo

  for (const {r} of res) for (const [g,v] of Object.entries(r.porGrupo)) if(g!=='Sin clasificar') totalGrupo[g]=(totalGrupo[g]||0)+v;
  const gruposOrd = Object.entries(totalGrupo).sort((a,b)=>b[1]-a[1]).map(([g])=>g);
  const topGrupos = gruposOrd.slice(0,6);
  const resto = gruposOrd.slice(6);
  return {serie, res, topGrupos, resto};
}

/* DetecciГіn de recurrentes: comercios que aparecen en muchos meses con importe estable.
   Devuelve suscripciones/recibos fijos, marcando los que han subido de precio. */
function limpiarNombreRec(clave){
  let s = clave.replace(/^CORE/i,'').replace(/^PAYPAL \*/i,'').replace(/^PRES\.\d+/i,'PrГ©stamo/Hipoteca');
  s = s.replace(/\b(S\.?A\.?U?|S\.?L\.?U?|SOCIEDAD ANONIMA|SOCIEDAD A|CLIENTES|UNIPERSONAL)\b\.?/gi,'').trim();
  s = s.replace(/[,.\s]+$/,'').trim();
  // capitalizar bonito, dejando conectores en minГәscula
  const conect = new Set(['de','del','la','el','los','las','y','e']);
  return s.split(' ').filter(Boolean).map((w,i)=>{
    const lw = w.toLowerCase();
    if (i>0 && conect.has(lw)) return lw;
    return w.length>2 ? w.charAt(0)+w.slice(1).toLowerCase() : w.toUpperCase();
  }).join(' ') || clave;
}
// categorГӯas que son "recibos de verdad" cuya subida importa vigilar
const CATS_RECIBO = new Set(['suministros','telecom','seguros','suscripciones','comunidad','hipoteca','prestamo_coche','prestamos','educacion']);
function detectarRecurrentes(){
  const gastos = MOVS.filter(m=>m.importe<0);
  const grupos = {};
  for (const m of gastos){
    const con = conceptoDe(m);
    if (con.tipo!=='comercio' || con.clave==='Compra con tarjeta sin comercio' || con.clave==='CUOTA TARJETA') continue;
    // clave normalizada para agrupar variantes del mismo emisor (quita sufijos societarios)
    const norm = con.clave.toLowerCase().replace(/^core/,'').replace(/\b(s\.?a\.?u?|s\.?l\.?u?|sociedad anonima|sociedad a|clientes|unipersonal)\b\.?/gi,'').replace(/[,.\s]+/g,' ').trim();
    (grupos[norm] = grupos[norm] || {clave:con.clave, movs:[]}).movs.push(m);
  }
  const rec = [];
  for (const k in grupos){
    const g = grupos[k];
    const byMes = {};
    for (const m of g.movs){ byMes[m.ym] = (byMes[m.ym]||0) + (-m.importe); }
    const meses = Object.keys(byMes).sort();
    if (meses.length < 6) continue;
    const vals = meses.map(ym=>byMes[ym]);
    const media = vals.reduce((a,b)=>a+b,0)/vals.length;
    const cv = Math.sqrt(vals.reduce((s,x)=>s+(x-media)**2,0)/vals.length)/media;
    if (cv >= 0.30) continue;
    const cats = {}; g.movs.forEach(m=>{ if(m.categoriaId) cats[m.categoriaId]=(cats[m.categoriaId]||0)+1; });
    const catId = Object.entries(cats).sort((a,b)=>b[1]-a[1])[0]?.[0] || null;
    const nComp = Math.min(6, Math.floor(vals.length/2));
    const prim = vals.slice(0,nComp), ult = vals.slice(-nComp);
    const mp = prim.reduce((a,b)=>a+b,0)/prim.length, mu = ult.reduce((a,b)=>a+b,0)/ult.length;
    const subidaPct = mp>0 ? (mu-mp)/mp*100 : 0;
    rec.push({
      clave: limpiarNombreRec(g.clave), claveRaw: g.clave.toLowerCase(), catId, media, cv, mesesN: meses.length,
      actual: mu, inicial: mp, subidaPct, primerYM: meses[0], ultimoYM: meses[meses.length-1],
      esRecibo: CATS_RECIBO.has(catId)
    });
  }
  rec.sort((a,b)=> (b.subidaPct>=8&&b.esRecibo?1:0)-(a.subidaPct>=8&&a.esRecibo?1:0) || b.media-a.media);
  return rec;
}
// para el aviso destacado solo cuentan recibos de verdad que suben (no restauraciГіn puntual)
function recurrentesConSubida(){ return detectarRecurrentes().filter(r=>r.subidaPct>=8 && r.esRecibo); }

/* DetecciГіn de gastos anГіmalos: importes muy por encima de lo normal en su categorГӯa.
   Excluye flujos internos y traspasos/Bizums a uno mismo (no son gasto real). */
function detectarAnomalos(mesFiltro){
  // estadГӯsticas por categorГӯa de gasto sobre todo el histГіrico
  const porCat = {};
  for (const m of MOVS){
    if (m.importe>=0 || !m.categoriaId) continue;
    const c = catById(m.categoriaId);
    if (!c || c.tipo!=='gasto') continue;              // solo gasto real (excluye internos/ingresos)
    (porCat[m.categoriaId] = porCat[m.categoriaId]||[]).push(-m.importe);
  }
  const stats = {};
  for (const cid in porCat){
    const arr = porCat[cid];
    const media = arr.reduce((a,b)=>a+b,0)/arr.length;
    const sd = Math.sqrt(arr.reduce((s,x)=>s+(x-media)**2,0)/arr.length);
    stats[cid] = {media, sd, n:arr.length};
  }
  const propios = new Set([...(REGLAS.nombresPropios||[])].map(s=>s.toLowerCase()));
  const anom = [];
  for (const m of MOVS){
    if (m.importe>=0 || !m.categoriaId) continue;
    if (mesFiltro && m.ym!==mesFiltro) continue;
    const c = catById(m.categoriaId);
    if (!c || c.tipo!=='gasto') continue;
    // excluir traspasos/Bizums a uno mismo aunque estГ©n como gasto
    const con = conceptoDe(m);
    const claveL = con.clave.toLowerCase();
    const desc = (m.descripcion||'').toLowerCase();
    const esPropio = [...propios].some(p=>p && (claveL.includes(p) || desc.includes(p)));
    const esTraspaso = /traspaso/.test(desc);
    if (esPropio || esTraspaso) continue;
    const s = stats[m.categoriaId];
    if (!s || s.n<8) continue;                         // categorГӯa con pocos datos: no fiable
    const v = -m.importe;
    const umbral = Math.max(s.media + 3*s.sd, s.media*2.5);  // muy por encima de lo habitual
    if (v>=umbral && v>=100){
      anom.push({id:m.id, fecha:m.fecha, ym:m.ym, importe:v, catId:m.categoriaId,
        concepto: con.clave, media:s.media, veces:+(v/s.media).toFixed(1)});
    }
  }
  anom.sort((a,b)=>b.fecha.localeCompare(a.fecha) || b.importe-a.importe);
  return anom;
}
function anomalosMes(ym){ return detectarAnomalos(ym); }

async function fijarPlan(catId, valor){
  const c = catById(catId); if(!c) return;
  const v = valor.trim().replace(/[^\d.,-]/g,'').replace(/\./g,'').replace(',','.');
  const n = parseFloat(v);
  if (valor.trim()==='' || isNaN(n)){ c.planManual = null; }
  else { c.planManual = Math.round(n); }
  c.planMes = planEfectivo(c); // mantiene compatibilidad con el resumen
  await guardarConfig();
  render();
}
async function quitarPlan(catId){
  const c = catById(catId); if(!c) return;
  c.planManual = null; c.planMes = planEfectivo(c);
  await guardarConfig(); render();
}
async function recalcularYGuardar(){
  const n = recalcularPlanes();
  for (const c of CATS) c.planMes = planEfectivo(c);
  await guardarConfig();
  alert('Plan calculado actualizado para '+n+' categorГӯas desde tus Гәltimos 12 meses.');
  render();
}

        <div class="tiny muted">${g.movs.length} movimiento${g.movs.length>1?'s':''} В· ${g.movs[0].fecha.slice(0,7)} вҶ’ ${g.movs[g.movs.length-1].fecha.slice(0,7)}${notas.length?` В· ${esc(notas.join(' / '))}`:''}</div>

          <select id="gsel-${gi}">${['<option value="">Elige categorГӯaвҖҰ</option>'].concat(agrupaOpciones('')).join('')}</select>
          <button class="btn" onclick="asignarGrupo(${gi})">Asignar (${g.movs.length})</button>
        </div>
        ${reglaOk?`<label class="tiny muted" style="display:flex;gap:6px;align-items:center;margin-top:8px;cursor:pointer">
          <input type="checkbox" id="gregla-${gi}" checked style="width:auto"> Recordar regla: <span class="mono">"${esc(sugerida)}"</span>
        </label>`:''}
      </div>`;
    }).join('')}`;

}

async function asignarGrupo(gi){
  const g = window.__grupos[gi];
  const sel = document.getElementById('gsel-'+gi);
  if (!g || !sel.value) return;
  const cat = sel.value, fl = flujoDe(cat);
  for (const m of g.movs){ m.categoriaId=cat; m.via='manual'; m.revisado=true; m.flujo=fl; }
  await dbPutAll(g.movs);
  const chk = document.getElementById('gregla-'+gi);
  if (chk && chk.checked){
    const clave = (g.tipo==='persona' ? g.clave : g.clave.slice(0,30)).toLowerCase().trim();
    const v = claveValida(clave, REGLAS);
    if (v.ok){
      REGLAS.comercios[v.clave] = cat; guardarConfig();
      const extra=[];
      for (const x of MOVS){
        if (x.via==='manual') continue;
        if ((x.descripcion||'').toLowerCase().includes(v.clave)){ x.categoriaId=cat; x.via='dict'; x.flujo=fl; x.revisado=true; extra.push(x); }
      }
      if (extra.length) await dbPutAll(extra);
    }
  }
  render();
}

async function asignarDesdeBandeja(id){
  const m = MOVS.find(x=>x.id===id);
  const sel = document.getElementById('sel-'+cssId(id));
  if (!m || !sel.value) return;
  m.categoriaId = sel.value; m.via='manual'; m.revisado=true; m.flujo=flujoDe(sel.value);
  await dbPutAll([m]);
  const con = conceptoDe(m);
  const sugerida = (con.tipo==='persona' ? con.clave : con.clave.slice(0,30)).toLowerCase().trim();
  const valida = claveValida(sugerida, REGLAS).ok;
  const box = document.getElementById('regla-'+cssId(id));

async function guardarRegla(id){
  const m = MOVS.find(x=>x.id===id);
  const inp = document.getElementById('clave-'+cssId(id));
  const v = claveValida(inp.value, REGLAS);
  if (!v.ok){ alert(v.motivo); return; }
  REGLAS.comercios[v.clave] = m.categoriaId;
  guardarConfig();
  // reaplica a todos los no manuales que coincidan
  const afectados=[];
  for (const x of MOVS){
    if (x.via==='manual') continue;
    if ((x.descripcion||'').toLowerCase().includes(v.clave)){
      x.categoriaId=m.categoriaId; x.via='dict'; x.flujo=flujoDe(m.categoriaId); x.revisado=true;
      afectados.push(x);
    }
  }
  if (afectados.length) await dbPutAll(afectados);
  renderTrasBandeja(afectados.length);
}

async function cargarPrivados(files){
  if (!files || !files.length) return;
  try{
    const txt = await files[0].text();
    let datos;
    // admite tanto el .js (window.DATOS_PRIVADOS = {...};) como un .json plano
    const m = txt.match(/window\.DATOS_PRIVADOS\s*=\s*(\{[\s\S]*\})\s*;?/);
    datos = JSON.parse(m ? m[1] : txt);
    if (!datos || !datos.comercios) throw new Error('El fichero no tiene el formato esperado.');
    Object.assign(REGLAS.comercios, datos.comercios||{});
    for (const campo of ['cuentasAhorro','cuentasPropias','nombresPropios'])
      REGLAS[campo] = [...new Set([...(REGLAS[campo]||[]), ...((datos[campo])||[])])];
    for (const [cat,kws] of (datos.palabrasClave||[])){
      const ex = REGLAS.palabrasClave.find(r=>r[0]===cat);
      if (ex) ex[1].push(...kws.filter(k=>!ex[1].includes(k))); else REGLAS.palabrasClave.push([cat,kws]);
    }
    META.privadosCargados = true;
    await guardarConfig();
    // recategoriza lo no manual con las nuevas reglas privadas
    const afectados=[];
    for (const x of MOVS){ if (x.via==='manual') continue; const antes=x.categoriaId; aplicarCategoria(x); if (x.categoriaId!==antes) afectados.push(x); }
    if (afectados.length) await dbPutAll(afectados);
    alert('Datos privados cargados y guardados en Firestore. '+afectados.length+' movimientos recategorizados.');
    render();
  }catch(e){ alert('No se pudieron cargar: '+e.message); }
}
function exportarBackup(){
  const data = {version:1, exportado:new Date().toISOString(), meta:META, categorias:CATS, reglas:REGLAS, movimientos:MOVS};
  const blob = new Blob([JSON.stringify(data)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'economia-casa-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(a.href);
}
async function restaurarBackup(files){
  if (!files.length) return;
  try{
    const data = JSON.parse(await files[0].text());
    if (!data.movimientos || !data.categorias) throw new Error('El fichero no parece una copia de esta herramienta.');
    if (!confirm(`La copia tiene ${data.movimientos.length} movimientos. SustituirГЎ todo lo actual. ВҝContinuar?`)) return;
    await dbClear();
    MOVS = data.movimientos; CATS = data.categorias; REGLAS = data.reglas; META = data.meta||META;
    await dbPutAll(MOVS); guardarConfig(); render();
  }catch(err){ alert('No se pudo restaurar: '+err.message); }
}
async function borrarTodo(){
  if (!confirm('Se borrarГЎn todos los movimientos y reglas aprendidas. ВҝSeguro?')) return;
  if (!confirm('Гҡltima confirmaciГіn: esta acciГіn no se puede deshacer sin una copia de seguridad.')) return;
  await dbClear(); localStorage.removeItem(LS.cats); localStorage.removeItem(LS.reglas); localStorage.removeItem(LS.meta);
  MOVS=[]; cargarConfig(); render();
}
async function recategorizarTodo(){
  const afectados=[];
  for (const m of MOVS){ if (m.via==='manual') continue; const antes=m.categoriaId; aplicarCategoria(m); if(m.categoriaId!==antes) afectados.push(m); }
  if (afectados.length) await dbPutAll(afectados);
  alert(afectados.length+' movimientos han cambiado de categorГӯa.');
  render();
}

/* ============ HOJA DE EDICIГ“N ============ */
function abrirHoja(id){
  const m = MOVS.find(x=>x.id===id); if(!m) return;
  const concepto = conceptoDe(m);
  const claveProp = (concepto.tipo==='persona'?concepto.clave:concepto.clave.slice(0,30)).toLowerCase().trim();
  const valida = claveValida(claveProp, REGLAS).ok;
  const similares = valida ? MOVS.filter(x=>x.id!==id && (x.descripcion||'').toLowerCase().includes(claveProp)) : [];
  const nAuto = similares.filter(x=>x.via!=='manual').length;
  const nMan = similares.length - nAuto;
  $('#velo').style.display='block';
  const h = $('#hoja'); h.style.display='block';
  h.dataset.clave = claveProp;
  h.innerHTML = `
    <h3>${esc(descCorta(m))}</h3>
    <div class="micro muted">${fmtDia(m.fecha)} ${m.fecha.slice(0,4)} В· <span class="mono ${m.importe>0?'pos':'neg'}">${fmtEUR2(m.importe)}</span>${m.saldo!=null?` В· saldo ${fmtEUR2(m.saldo)}`:''}</div>
    <div class="tiny muted" style="margin-top:6px;word-break:break-word">${esc(m.descripcion)}</div>
    <div class="campo"><label for="h-cat">CategorГӯa</label>
      <select id="h-cat" onchange="refrescarPropagar()">${['<option value="">Sin clasificar</option>'].concat(agrupaOpciones(m.categoriaId)).join('')}</select></div>
    <div id="h-prop-wrap" data-nauto="${nAuto}" data-nman="${nMan}" data-catini="${m.categoriaId||''}"></div>
    <div class="campo"><label for="h-nota">Nota</label>
      <input type="text" id="h-nota" value="${esc(m.nota||'')}" placeholder="Opcional"></div>
    <div class="campo" style="display:flex;gap:8px">
      <button class="btn" onclick="guardarHoja('${m.id}')">Guardar</button>
      <button class="btn sec" onclick="cerrarHoja()">Cancelar</button>
    </div>`;
  refrescarPropagar();
}
function refrescarPropagar(){
  const wrap = $('#h-prop-wrap'); if(!wrap) return;
  const nAuto = +wrap.dataset.nauto, nMan = +wrap.dataset.nman;
  const cat = document.getElementById('h-cat').value;
  const cambia = cat && cat !== wrap.dataset.catini;
  const total = nAuto + nMan;
  if (!cambia || total===0){ wrap.innerHTML=''; return; }
  const nom = catById(cat)?.nombre || '';
  wrap.innerHTML = `<div class="regla-box" style="flex-direction:column;align-items:stretch;gap:8px">
    <label class="micro" style="display:flex;gap:8px;align-items:flex-start;cursor:pointer">
      <input type="checkbox" id="h-prop" style="width:auto;margin-top:2px">
      <span>Aplicar tambiГ©n a <strong>${total}</strong> movimiento${total>1?'s':''} igual${total>1?'es':''} (<span class="mono">"${esc($('#hoja').dataset.clave)}"</span>) вҶ’ ${esc(nom)}, y recordar la regla${nMan?`. <span class="muted">Incluye ${nMan} que ya ajustaste a mano; se sobrescribirГЎn.</span>`:'.'}</span>
    </label>
  </div>`;
}
async function guardarHoja(id){
  const m = MOVS.find(x=>x.id===id); if(!m) return;
  const cat = document.getElementById('h-cat').value || null;
  const catCambia = cat !== m.categoriaId;
  if (catCambia){ m.categoriaId=cat; m.via = cat?'manual':null; m.flujo = cat?flujoDe(cat):'real'; m.revisado=!!cat; }
  m.nota = document.getElementById('h-nota').value;
  const guardar = [m];
  const prop = document.getElementById('h-prop');
  if (cat && catCambia && prop && prop.checked){
    const clave = $('#hoja').dataset.clave;
    const v = claveValida(clave, REGLAS);
    if (v.ok){
      REGLAS.comercios[v.clave] = cat; guardarConfig();
      const fl = flujoDe(cat);
      for (const x of MOVS){
        if (x.id===id) continue;
        if ((x.descripcion||'').toLowerCase().includes(v.clave)){ x.categoriaId=cat; x.via='dict'; x.flujo=fl; x.revisado=true; guardar.push(x); }
      }
    }
  }
  await dbPutAll(guardar);
  cerrarHoja(); render();
}
function cerrarHoja(){ $('#velo').style.display='none'; $('#hoja').style.display='none'; }

async function hacerLogin(){
  const mail = document.getElementById('lg-mail').value.trim();
  const pass = document.getElementById('lg-pass').value;
  const err = document.getElementById('lg-err');
  const btn = document.getElementById('lg-btn');
  err.textContent=''; btn.disabled=true; btn.textContent='EntrandoвҖҰ';
  try {
    await AUTH.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    await AUTH.signInWithEmailAndPassword(mail, pass);
    // el observador onAuthStateChanged se encarga del resto
  } catch(e){
    const msg = {
      'auth/invalid-email':'Correo no vГЎlido.',
      'auth/invalid-credential':'Correo o contraseГұa incorrectos.',
      'auth/wrong-password':'Correo o contraseГұa incorrectos.',
      'auth/user-not-found':'Correo o contraseГұa incorrectos.',
      'auth/too-many-requests':'Demasiados intentos. Espera un momento.',
      'auth/network-request-failed':'Sin conexiГіn. Revisa tu red.'
    }[e.code] || ('No se pudo entrar ('+e.code+').');
    err.textContent = msg;
  } finally { btn.disabled=false; btn.textContent='Entrar'; }
}
async function cerrarSesion(){ await AUTH.signOut(); location.reload(); }

function mostrarLogin(){ document.getElementById('login').style.display='flex'; document.getElementById('app').style.display='none'; }
// saludo amable con el nombre antes de la @ y emoji segГәn la hora
function saludoTexto(email){
  const nombre = (email||'').split('@')[0].split(/[._-]/)[0];
  const cap = nombre ? nombre.charAt(0).toUpperCase()+nombre.slice(1) : '';
  const h = new Date().getHours();
  const emoji = h<6?'рҹҢҷ':h<13?'вҳҖпёҸ':h<21?'рҹ‘Ӣ':'рҹҢҷ';
  return `Hola ${esc(cap)} ${emoji}`;
}

AUTH.onAuthStateChanged(async user => {
  if (!user){ mostrarLogin(); return; }
  UID = user.uid;
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('topbar').innerHTML =
    `<div><h1>EconomГӯa de casa</h1><div class="saludo">${saludoTexto(user.email)} В· <button class="salir" onclick="cerrarSesion()">salir</button></div></div>`;
  try {
    DB = await abrirDB();
    await cargarConfig();
    MOVS = await cacheGetAll();
    render();                    // arranque instantГЎneo desde la cachГ© local
    if (seedActualizada && MOVS.length){
      const afectados=[];
      for (const m of MOVS){ if (m.via==='manual') continue; const antes=m.categoriaId; aplicarCategoria(m); if (m.categoriaId!==antes) afectados.push(m); }
      if (afectados.length) await dbPutAll(afectados);
    }
    escucharMovimientos();       // sincronizaciГіn en vivo con la nube (tiempo real)
    escucharConfig();
  } catch(e){
    document.getElementById('main').innerHTML = `<div class="card"><strong>Error al iniciar.</strong><div class="tiny mono" style="color:var(--gasto);margin-top:6px">${esc(e.message)}</div></div>`;
  }
});
// permite entrar con Enter desde la contraseГұa
document.addEventListener('keydown', e=>{ if(e.key==='Enter' && document.getElementById('login').style.display!=='none') hacerLogin(); });
